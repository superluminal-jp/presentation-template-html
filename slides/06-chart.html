<!doctype html>
<html lang="ja" data-annotations="off" data-org="（組織名）" data-copyright="© 2026 （組織名）" data-confidentiality="2">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>図表 — レイアウト単体</title>
  <link rel="stylesheet" href="../tokens/vendor/tokens.css" />
  <link rel="stylesheet" href="../styles/tokens.semantic.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/grid.css" />
  <link rel="stylesheet" href="../styles/slides.css" />
  <link rel="stylesheet" href="../styles/layouts/chart.css" />
  <link rel="stylesheet" href="../styles/frame.css" />
</head>
<body>
  <div class="deck">
    <section class="slide slide--chart" data-layout="chart">
      <div class="slide__stage">
        <h2 class="slide__heading">作成時間は<span class="u-accent">4時間→1時間</span>に短縮します</h2>
        <div class="chart">
          <svg class="chart-sample" viewBox="0 0 420 320" role="img" aria-label="内製4時間に対しテンプレート1時間">
            <line class="axis" x1="60" y1="20" x2="60" y2="280" />
            <line class="axis" x1="60" y1="280" x2="400" y2="280" />
            <rect class="bar--muted" x="110" y="80" width="90" height="200" />
            <rect class="bar" x="250" y="230" width="90" height="50" />
            <text class="label" x="155" y="300" text-anchor="middle">内製 4h</text>
            <text class="label" x="295" y="300" text-anchor="middle">テンプレ 1h</text>
          </svg>
        </div>
        <div class="takeaway">
          <p class="lead">約<span class="u-accent">75%</span>削減</p>
          <p>基準値（4時間）を先に示し、削減幅の解釈を助ける。</p>
        </div>
        <div class="slide__footer">
          <span class="slide__citation">出典: 社内試行測定（2026-06, n=8）</span>
          
        </div>
      </div>
      <aside class="slide__annotation" data-annotation hidden aria-label="設計意図と出典">
        <p class="annotation__intent">長さで量を比較（棒）。装飾を排し、要点にアクセント色を1箇所。基準値でアンカリング。</p>
        <ul class="annotation__practices">
          <li data-practice="C-cleveland-mcgill">Cleveland–McGill（→ #C-cleveland-mcgill）</li>
          <li data-practice="C-data-ink">データインク比（→ #C-data-ink）</li>
          <li data-practice="E-anchoring">アンカリング（→ #E-anchoring）</li>
        </ul>
      </aside>
    </section>
  </div>
  <script src="../js/annotations.js"></script>
  <script src="../js/frame.js"></script>
</body>
</html>
