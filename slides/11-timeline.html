<!doctype html>
<html lang="ja" data-annotations="off" data-org="（組織名）" data-copyright="© 2026 （組織名）" data-confidentiality="2">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>タイムライン — レイアウト単体</title>
  <link rel="stylesheet" href="../tokens/vendor/tokens.css" />
  <link rel="stylesheet" href="../styles/tokens.semantic.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/grid.css" />
  <link rel="stylesheet" href="../styles/slides.css" />
  <link rel="stylesheet" href="../styles/layouts/timeline.css" />
  <link rel="stylesheet" href="../styles/frame.css" />
</head>
<body>
  <div class="deck">
    <section class="slide slide--timeline" data-layout="timeline">
      <div class="slide__stage">
        <h2 class="slide__heading">導入は<span class="u-accent">3か月・4ステップ</span>で進めます</h2>
        <div class="timeline">
          <div class="step"><span class="step__marker">1</span><span class="step__label">試行</span><span class="step__body">1部署で運用検証</span></div>
          <div class="step"><span class="step__marker">2</span><span class="step__label">整備</span><span class="step__body">テンプレ拡充・教育</span></div>
          <div class="step"><span class="step__marker">3</span><span class="step__label">展開</span><span class="step__body">全部署へ横展開</span></div>
          <div class="step"><span class="step__marker">4</span><span class="step__label">定着</span><span class="step__body">更新運用の定常化</span></div>
        </div>
        <div class="slide__footer">
          <div class="slide__signpost" aria-label="現在地"><span class="signpost__dot" aria-current="true"></span><span class="signpost__dot"></span><span class="signpost__dot"></span><span class="signpost__dot"></span></div>
          
        </div>
      </div>
      <button class="slide__annotation-toggle" type="button">i</button>
      <aside class="slide__annotation" data-annotation hidden aria-label="設計意図と出典">
        <p class="annotation__intent">時間軸で全体像を提示(状況→行動)。反復する体裁で見通しを与える。</p>
        <ul class="annotation__practices">
          <li data-practice="A-scqa">SCQA（→ #A-scqa）</li>
          <li data-practice="A-consistency">一貫性/テンプレート化（→ #A-consistency）</li>
          <li data-practice="A-signposting">サインポスティング（→ #A-signposting）</li>
        </ul>
      </aside>
    </section>
  </div>
  <script src="../js/annotations.js"></script>
  <script src="../js/frame.js"></script>
</body>
</html>
